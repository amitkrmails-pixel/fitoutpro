<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitoutJobs - Corporate Interior Fit-Out Job Portal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        /* Utility for line clamp */
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
    </style>
</head>
<body class="font-sans text-slate-900 bg-white min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                
                <!-- Logo -->
                <div class="flex items-center cursor-pointer" onclick="navigate('home')">
                    <div class="w-8 h-8 bg-blue-800 rounded-md flex items-center justify-center mr-2">
                        <i data-lucide="building-2" class="text-white w-5 h-5"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-slate-900">
                        Fitout<span class="text-blue-800">Jobs</span>
                    </span>
                </div>

                <!-- Desktop Nav -->
                <nav class="hidden md:flex items-center space-x-8" id="desktop-nav">
                    <!-- Nav items injected by JS -->
                </nav>

                <!-- Mobile menu button -->
                <div class="md:hidden flex items-center">
                    <button onclick="toggleMobileMenu()" class="text-slate-600 hover:text-slate-900" id="mobile-menu-btn">
                        <i data-lucide="menu" class="h-6 w-6"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Mobile Nav Dropdown -->
        <div id="mobile-nav" class="hidden md:hidden bg-white border-b border-slate-200 px-4 pt-2 pb-4 space-y-1 shadow-lg absolute w-full z-40">
            <!-- Mobile nav items injected by JS -->
        </div>
    </header>

    <!-- Main Content Area -->
    <main id="app-main" class="flex-grow">
        <!-- Views injected by JS -->
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-300 py-12 border-t border-slate-800">
        <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-4 gap-8">
            <div class="col-span-1 md:col-span-1">
                <div class="flex items-center mb-4 opacity-90">
                    <div class="w-8 h-8 bg-blue-600 rounded-md flex items-center justify-center mr-2">
                        <i data-lucide="building-2" class="text-white w-5 h-5"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-white">
                        Fitout<span class="text-blue-400">Jobs</span>
                    </span>
                </div>
                <p class="text-sm text-slate-400 leading-relaxed mb-4">
                    The premium dedicated job platform connecting top talent with leading corporate interior contracting, PMC, and design-build firms.
                </p>
            </div>
            
            <div>
                <h4 class="text-white font-semibold mb-4">For Candidates</h4>
                <ul class="space-y-2 text-sm">
                    <li><button onclick="navigate('jobs')" class="hover:text-white transition-colors">Browse All Jobs</button></li>
                    <li><button class="hover:text-white transition-colors">Career Advice</button></li>
                    <li><button class="hover:text-white transition-colors">Salary Guide</button></li>
                    <li><button onclick="navigate('login')" class="hover:text-white transition-colors">Create Profile</button></li>
                </ul>
            </div>

            <div>
                <h4 class="text-white font-semibold mb-4">For Employers</h4>
                <ul class="space-y-2 text-sm">
                    <li><button onclick="navigate('post-job')" class="hover:text-white transition-colors">Post a Job</button></li>
                    <li><button class="hover:text-white transition-colors">Search Resumes</button></li>
                    <li><button class="hover:text-white transition-colors">Pricing</button></li>
                    <li><button onclick="navigate('login')" class="hover:text-white transition-colors">Employer Login</button></li>
                </ul>
            </div>

            <div>
                <h4 class="text-white font-semibold mb-4">Company</h4>
                <ul class="space-y-2 text-sm">
                    <li><button class="hover:text-white transition-colors">About Us</button></li>
                    <li><button class="hover:text-white transition-colors">Contact</button></li>
                    <li><button class="hover:text-white transition-colors">Privacy Policy</button></li>
                    <li><button class="hover:text-white transition-colors">Terms of Service</button></li>
                </ul>
            </div>
        </div>
        <div class="max-w-7xl mx-auto px-4 mt-12 pt-8 border-t border-slate-800 text-sm text-slate-500 flex flex-col md:flex-row justify-between items-center">
            <p>© <span id="current-year"></span> FitoutJobs. All rights reserved.</p>
            <div class="flex space-x-4 mt-4 md:mt-0">
                <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center hover:bg-blue-600 transition-colors cursor-pointer text-xs text-white">in</div>
                <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center hover:bg-blue-400 transition-colors cursor-pointer text-xs text-white">tw</div>
                <div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center hover:bg-blue-800 transition-colors cursor-pointer text-xs text-white">fb</div>
            </div>
        </div>
    </footer>

    <!-- Application Script -->
    <script>

        const JOBS = [

            {

                description: 'Seeking a detail-oriented QS & Billing Engineer for commercial interior projects. You will be responsible for quantity take-offs, checking contractor bills, and preparing client RA bills.',
                responsibilities: ['Preparation of Client RA Bills', 'Checking and certifying vendor bills', 'Quantity measurement from AutoCAD drawings', 'Reconciliation of materials']

                description: 'Join our design-build team as a Design Coordinator. You will act as the bridge between the design team and site execution team, ensuring all GFC drawings are accurate and constructible.',

            {

                skills: ['Vendor Management', 'Material Sourcing', 'Work Orders', 'Contracts'],
                posted: '5 hours ago',
                description: 'We need a strategic Procurement Manager to handle sourcing of interior finishing materials, furniture, and MEP equipment for large-scale corporate projects.',
                responsibilities: ['Vendor development and onboarding', 'Negotiating rates and commercial terms', 'Issuing POs and Work Orders', 'Ensuring timely delivery of materials to site']
            },
            {
                id: 5, title: 'MEP Coordinator – Commercial Interiors', company: 'Metroline Projects', location: 'Delhi',
                experience: '5-8 Years', salary: '₹7L - ₹11L PA', type: 'Contract', dept: 'MEP Coordination',
                skills: ['HVAC Coordination', 'Firefighting', 'Electrical', 'Plumbing'],
                posted: '1 week ago',
                description: 'Looking for an MEP Coordinator with strong experience in corporate interior fit-outs. You will ensure all services are clash-free and executed as per design.',
                responsibilities: ['Reviewing MEP drawings', 'Coordinating between interior and MEP teams', 'Site supervision of MEP works', 'Testing and commissioning assistance']
            },
            {
                id: 6, title: 'Business Development Manager', company: 'Corporate Space Makers', location: 'Pune',
                experience: '7-12 Years', salary: '₹10L - ₹15L PA + Incentives', type: 'Full-time', dept: 'Business Development',
                skills: ['Lead Generation', 'Corporate Sales', 'Tender Follow-Up', 'CRM'],
                posted: '2 days ago',
                description: 'Drive growth for our fit-out business. We are looking for a BDM with a strong network among architects, PMCs, and corporate real estate heads.',
                responsibilities: ['Generating new project leads', 'Pitching to corporate clients', 'Follow-up on submitted tenders', 'Achieving sales targets']
            },
            {
                id: 7, title: 'Site Store Incharge', company: 'BuildRight Interiors', location: 'Hyderabad',
                experience: '2-5 Years', salary: '₹3L - ₹4.5L PA', type: 'Full-time', dept: 'Store & Inventory',
                skills: ['Site Store', 'Material Inward', 'GRN', 'Stock Register'],
                posted: '4 days ago',
                description: 'Manage material inventory at a large corporate fit-out site. Responsible for safe storage, issuance, and record-keeping.',
                responsibilities: ['Maintaining stock register', 'Preparing GRN', 'Issuing materials to contractors', 'Daily stock reconciliation']
            },
            {
                id: 8, title: 'QA/QC Engineer – Interior Projects', company: 'Prime PMC Services', location: 'Chennai',
                experience: '4-8 Years', salary: '₹6L - ₹9L PA', type: 'Full-time', dept: 'QA/QC & HSE',
                skills: ['Snagging', 'Handover', 'Quality Checklists', 'Material Inspection'],
                posted: 'Just now',
                description: 'Ensure the highest quality standards are maintained on our premium interior projects. Prepare and execute quality plans.',
                responsibilities: ['Conducting site inspections', 'Preparing snag lists', 'Checking incoming materials', 'Maintaining QA/QC documentation']
            }
        ];

        const COMPANIES = [
            { name: 'UrbanEdge Interiors', type: 'Design & Build Firm', jobs: 12, logo: 'UI' },
            { name: 'Workspace Buildcon', type: 'Fit-Out Contractor', jobs: 8, logo: 'WB' },
            { name: 'Apex Fit-Out Solutions', type: 'Fit-Out Contractor', jobs: 15, logo: 'AF' },
            { name: 'Metroline Projects', type: 'PMC', jobs: 5, logo: 'MP' },
            { name: 'DesignAxis Studio', type: 'Architecture Firm', jobs: 7, logo: 'DA' },
            { name: 'Corporate Space Makers', type: 'Design & Build Firm', jobs: 10, logo: 'CS' },
        ];

        const LOCATIONS = ['Noida', 'Gurugram', 'Delhi', 'Mumbai', 'Bengaluru', 'Hyderabad', 'Pune', 'Chennai'];
        const EXPERIENCE_LEVELS = ['0-2 Years', '2-5 Years', '5-8 Years', '8-12 Years', '12+ Years'];

        // --- APP STATE ---
        let currentPage = 'home';
        let selectedJob = null;
        let userRole = null; // 'candidate', 'employer', or null
        let isMobileMenuOpen = false;
        let isLoginMode = true; // For login/register toggle

        // --- NAVIGATION & ACTIONS ---
        function navigate(page) {
            currentPage = page;
            selectedJob = null;
            isMobileMenuOpen = false;
            window.scrollTo(0, 0);
            render();
        }

        function handleJobSelect(jobId) {
            selectedJob = JOBS.find(j => j.id === jobId);
            currentPage = 'job-detail';
            window.scrollTo(0, 0);
            render();
        }

        function toggleMobileMenu() {
            isMobileMenuOpen = !isMobileMenuOpen;
            renderHeader(); // Only update header
        }

        function handleLogin(role) {
            userRole = role;
            if (role === 'employer') navigate('employer-dashboard');
            else navigate('candidate-dashboard');
        }

        function handleLogout() {
            userRole = null;
            navigate('home');
        }

        function toggleLoginMode() {
            isLoginMode = !isLoginMode;
            render();
        }

        // --- UI COMPONENTS ---
        function getButtonClass(variant = 'primary') {
            const baseStyle = "inline-flex items-center justify-center px-4 py-2 text-sm font-medium rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2 cursor-pointer";
            const variants = {
                primary: "bg-blue-800 text-white hover:bg-blue-900 focus:ring-blue-800",
                secondary: "bg-emerald-600 text-white hover:bg-emerald-700 focus:ring-emerald-600",
                outline: "border border-slate-300 text-slate-700 hover:bg-slate-50 focus:ring-blue-800",
                ghost: "text-slate-600 hover:text-blue-800 hover:bg-blue-50 focus:ring-blue-800"
            };
            return `${baseStyle} ${variants[variant]}`;
        }

        function generateJobCardHTML(job) {
            const visibleSkills = job.skills.slice(0, 3);
            const extraSkillsCount = job.skills.length > 3 ? job.skills.length - 3 : 0;
            
            return `
            <div class="bg-white border border-slate-200 rounded-lg p-5 hover:shadow-lg transition-shadow cursor-pointer flex flex-col justify-between h-full group" onclick="handleJobSelect(${job.id})">
                <div>
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-lg font-semibold text-slate-900 group-hover:text-blue-800 transition-colors line-clamp-1">${job.title}</h3>
                            <p class="text-sm text-slate-600 mt-1">${job.company}</p>
                        </div>
                        <button class="text-slate-400 hover:text-blue-600 transition-colors" onclick="event.stopPropagation(); alert('Job saved!')">
                            <i data-lucide="bookmark" class="w-5 h-5"></i>
                        </button>
                    </div>
                    
                    <div class="flex flex-wrap gap-y-2 gap-x-4 mb-4 text-sm text-slate-600">
                        <span class="flex items-center gap-1"><i data-lucide="map-pin" class="w-4 h-4"></i> ${job.location}</span>
                        <span class="flex items-center gap-1"><i data-lucide="briefcase" class="w-4 h-4"></i> ${job.experience}</span>
                        <span class="flex items-center gap-1"><i data-lucide="wallet" class="w-4 h-4"></i> ${job.salary}</span>
                    </div>

                    <div class="flex flex-wrap gap-2 mb-4">
                        ${visibleSkills.map(skill => `<span class="px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded-full">${skill}</span>`).join('')}
                        ${extraSkillsCount > 0 ? `<span class="px-2 py-1 bg-slate-100 text-slate-600 text-xs rounded-full">+${extraSkillsCount}</span>` : ''}
                    </div>
                </div>
                
                <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-100">
                    <span class="text-xs text-slate-500">${job.posted}</span>
                    <span class="text-sm font-medium text-blue-800 group-hover:underline">View Details</span>
                </div>
            </div>`;
        }

        // --- VIEWS ---
        function getHomeViewHTML() {
            return `
            <div class="flex flex-col min-h-screen">

                    <div class="absolute inset-0 opacity-10">
                        <svg class="h-full w-full" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <pattern id="grid-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
                                    <path d="M0 40L40 0H20L0 20M40 40V20L20 40" fill="none" stroke="currentColor" stroke-width="1" />
                                </pattern>
                            </defs>
                            <rect width="100%" height="100%" fill="url(#grid-pattern)" />
                        </svg>
                    </div>

                    <div class="max-w-7xl mx-auto px-4 relative z-10">
                        <div class="max-w-3xl">
                            <h1 class="text-4xl md:text-5xl lg:text-6xl font-bold leading-tight mb-6">
                                Find Jobs in <span class="text-blue-400">Corporate Interior Fit-Out</span>
                            </h1>
                            <p class="text-lg text-slate-300 mb-10 leading-relaxed">
                                A dedicated platform for project, design, estimation, billing, procurement, business development, and site coordination roles in the interior contracting industry.
                            </p>

                            <!-- Search Box -->
                            <div class="bg-white p-2 rounded-lg shadow-xl flex flex-col md:flex-row gap-2">
                                <div class="flex-1 flex items-center px-4 bg-slate-50 rounded-md border border-slate-200">
                                    <i data-lucide="search" class="w-5 h-5 text-slate-400 mr-2"></i>
                                    <input type="text" placeholder="Job title, skills, or keywords" class="w-full bg-transparent border-none py-3 focus:outline-none text-slate-900 placeholder-slate-500"/>
                                </div>
                                <div class="flex-1 flex items-center px-4 bg-slate-50 rounded-md border border-slate-200">
                                    <i data-lucide="map-pin" class="w-5 h-5 text-slate-400 mr-2"></i>
                                    <select class="w-full bg-transparent border-none py-3 focus:outline-none text-slate-900">
                                        <option value="">Any Location</option>
                                        ${LOCATIONS.map(loc => `<option value="${loc}">${loc}</option>`).join('')}
                                    </select>
                                </div>
                                <button class="${getButtonClass('primary')} py-3 px-8 text-base" onclick="navigate('jobs')">Search Jobs</button>
                            </div>
                            
                            <p class="mt-4 text-sm text-slate-400 flex items-center gap-2">
                                <i data-lucide="shield-check" class="w-4 h-4 text-emerald-400"></i>
                                Trusted by leading contractors, PMCs, and design-build firms.

                    </div>
                </section>

                <section class="py-20 bg-slate-50">
                    <div class="max-w-7xl mx-auto px-4">
                        <div class="text-center mb-12">
                            <h2 class="text-3xl font-bold text-slate-900 mb-4">Explore Fit-Out Roles</h2>
                            <p class="text-slate-600 max-w-2xl mx-auto">Find specialized positions tailored to your expertise in commercial interiors.</p>
                        </div>

                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                            ${JOB_CATEGORIES.map(cat => `
                            <div class="bg-white p-6 rounded-xl border border-slate-200 hover:border-blue-500 hover:shadow-lg transition-all group cursor-pointer" onclick="navigate('jobs')">
                                <div class="w-12 h-12 bg-blue-50 rounded-lg flex items-center justify-center text-blue-800 mb-4 group-hover:bg-blue-800 group-hover:text-white transition-colors">
                                    <i data-lucide="${cat.icon}" class="w-6 h-6"></i>
                                </div>
                                <h3 class="text-lg font-semibold text-slate-900 mb-2">${cat.title}</h3>
                                <p class="text-sm text-slate-500 mb-4 line-clamp-2">${cat.desc}</p>
                                <div class="flex items-center text-blue-800 text-sm font-medium">
                                    ${cat.count} Open Jobs <i data-lucide="chevron-right" class="w-4 h-4 ml-1 group-hover:translate-x-1 transition-transform"></i>
                                </div>

                            `).join('')}
                        </div>
                    </div>
                </section>

                <!-- Featured Jobs -->
                <section class="py-20 bg-white">
                    <div class="max-w-7xl mx-auto px-4">
                        <div class="flex justify-between items-end mb-10">
                            <div>
                                <h2 class="text-3xl font-bold text-slate-900 mb-2">Featured Jobs</h2>

                        <p class="text-xl text-blue-200 mb-10 max-w-3xl mx-auto">
                            Post jobs and reach experienced professionals from the corporate interior, commercial fit-out, workplace design, and site execution industry. Stop sifting through irrelevant resumes.
                        </p>
                        <div class="flex flex-col sm:flex-row justify-center gap-4">
                            <button class="${getButtonClass('secondary')} px-8 py-3 text-lg" onclick="navigate('post-job')">Post a Job Now</button>
                            <button class="${getButtonClass('outline')} px-8 py-3 text-lg border-blue-400 text-blue-100 hover:bg-blue-800 hover:text-white bg-transparent" onclick="navigate('post-job')">View Pricing</button>
                        </div>
                    </div>
                </section>

                <!-- Companies -->
                <section class="py-20 bg-slate-50">
                    <div class="max-w-7xl mx-auto px-4">
                        <h2 class="text-3xl font-bold text-slate-900 mb-10 text-center">Top Companies Hiring</h2>
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                            ${COMPANIES.map(company => `
                            <div class="bg-white border border-slate-200 p-6 rounded-lg text-center hover:shadow-md transition-shadow cursor-pointer">
                                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center text-xl font-bold text-slate-400 mx-auto mb-4">
                                    ${company.logo}
                                </div>
                                <h4 class="font-semibold text-slate-900 text-sm mb-1 line-clamp-1">${company.name}</h4>
                                <p class="text-xs text-slate-500">${company.type}</p>
                                <div class="mt-4 text-xs font-medium text-blue-800">${company.jobs} Jobs</div>
                            </div>
                            `).join('')}
                        </div>
                    </div>
                </section>
            </div>`;

                                        <td class="py-4 px-6 text-sm text-slate-500">Oct 24, 2023</td>
                                        <td class="py-4 px-6 text-sm font-medium text-blue-800 cursor-pointer hover:underline">45 View</td>
                                        <td class="py-4 px-6 text-sm text-slate-500">
                                            <button class="hover:text-blue-800 mr-3">Edit</button>
                                            <button class="hover:text-red-600">Close</button>
                                        </td>
                                    </tr>
                                    <tr class="hover:bg-slate-50">
                                        <td class="py-4 px-6 text-sm font-medium text-slate-900">QS & Billing Engineer</td>
                                        <td class="py-4 px-6"><span class="px-2 py-1 bg-emerald-100 text-emerald-800 rounded-full text-xs font-medium">Active</span></td>
                                        <td class="py-4 px-6 text-sm text-slate-500">Oct 22, 2023</td>
                                        <td class="py-4 px-6 text-sm font-medium text-blue-800 cursor-pointer hover:underline">82 View</td>
                                        <td class="py-4 px-6 text-sm text-slate-500">
                                            <button class="hover:text-blue-800 mr-3">Edit</button>

            </div>`;
        }


        // --- RENDERING PIPELINE ---
        function renderHeader() {
            const desktopNav = document.getElementById('desktop-nav');
            const mobileNav = document.getElementById('mobile-nav');
            const mobileBtn = document.getElementById('mobile-menu-btn');

            // Desktop Links setup
            let desktopLinksHTML = `
                <button onclick="navigate('jobs')" class="text-sm font-medium hover:text-blue-800 ${currentPage === 'jobs' ? 'text-blue-800' : 'text-slate-600'}">Find Jobs</button>
                <button class="text-sm font-medium text-slate-600 hover:text-blue-800">Companies</button>
                <button class="text-sm font-medium text-slate-600 hover:text-blue-800">Career Advice</button>
                <div class="h-6 w-px bg-slate-200"></div>
            `;

            if (userRole) {
                const dashRoute = userRole === 'employer' ? 'employer-dashboard' : 'candidate-dashboard';
                const dashIcon = userRole === 'employer' ? 'building-2' : 'users';
                desktopLinksHTML += `
                    <div class="flex items-center space-x-4">
                        <button onclick="navigate('${dashRoute}')" class="text-sm font-medium text-slate-900 hover:text-blue-800 flex items-center">
                            <div class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center mr-2 border border-slate-200">
                                <i data-lucide="${dashIcon}" class="w-4 h-4 text-slate-600"></i>
                            </div>
                            Dashboard
                        </button>
                        <button onclick="handleLogout()" class="text-sm font-medium text-slate-500 hover:text-slate-800">Logout</button>
                    </div>
                `;
            } else {
                desktopLinksHTML += `
                    <div class="flex items-center space-x-4">
                        <button onclick="navigate('login')" class="text-sm font-medium text-slate-600 hover:text-blue-800">Login / Register</button>
                        <button class="${getButtonClass('primary')}" onclick="navigate('post-job')">Post a Job</button>
                    </div>
                `;
            }
            desktopNav.innerHTML = desktopLinksHTML;

            // Mobile menu logic
            if (isMobileMenuOpen) {
                mobileNav.classList.remove('hidden');
                mobileBtn.innerHTML = '<i data-lucide="x" class="h-6 w-6"></i>';
                
                let mobileLinksHTML = `
                    <button onclick="navigate('jobs')" class="block w-full text-left px-3 py-2 text-base font-medium text-slate-700 hover:bg-slate-50 hover:text-blue-800 rounded-md">Find Jobs</button>
                    <button class="block w-full text-left px-3 py-2 text-base font-medium text-slate-700 hover:bg-slate-50 hover:text-blue-800 rounded-md">Companies</button>
                    <button class="block w-full text-left px-3 py-2 text-base font-medium text-slate-700 hover:bg-slate-50 hover:text-blue-800 rounded-md">Career Advice</button>
                    <div class="border-t border-slate-200 pt-4 mt-4">
                `;

                if (userRole) {
                    const dashRoute = userRole === 'employer' ? 'employer-dashboard' : 'candidate-dashboard';
                    mobileLinksHTML += `
                        <button onclick="navigate('${dashRoute}')" class="block w-full text-left px-3 py-2 text-base font-medium text-slate-900 hover:bg-slate-50 rounded-md">Dashboard</button>
                        <button onclick="handleLogout()" class="block w-full text-left px-3 py-2 text-base font-medium text-slate-500 hover:bg-slate-50 rounded-md">Logout</button>
                    `;
                } else {
                    mobileLinksHTML += `
                        <button onclick="navigate('login')" class="block w-full text-left px-3 py-2 text-base font-medium text-slate-700 hover:bg-slate-50 hover:text-blue-800 rounded-md">Login / Register</button>
                        <button class="${getButtonClass('primary')} w-full mt-2" onclick="navigate('post-job')">Post a Job</button>
                    `;
                }
                mobileLinksHTML += `</div>`;
                mobileNav.innerHTML = mobileLinksHTML;
            } else {
                mobileNav.classList.add('hidden');
                mobileBtn.innerHTML = '<i data-lucide="menu" class="h-6 w-6"></i>';
            }
        }

        function render() {
            const mainContainer = document.getElementById('app-main');
            
            // Header rendering
            renderHeader();

            // Main view rendering
            if (selectedJob && currentPage === 'job-detail') {
                mainContainer.innerHTML = getJobDetailViewHTML(selectedJob);
            } else {
                switch (currentPage) {
                    case 'home': mainContainer.innerHTML = getHomeViewHTML(); break;
                    case 'jobs': mainContainer.innerHTML = getJobsViewHTML(); break;
                    case 'post-job': mainContainer.innerHTML = getPostJobViewHTML(); break;
                    case 'login': mainContainer.innerHTML = getLoginViewHTML(); break;
                    case 'candidate-dashboard': mainContainer.innerHTML = getCandidateDashboardViewHTML(); break;
                    case 'employer-dashboard': mainContainer.innerHTML = getEmployerDashboardViewHTML(); break;
                    default: mainContainer.innerHTML = getHomeViewHTML(); break;
                }
            }

            // Re-initialize Lucide icons after HTML replacement
            lucide.createIcons();
        }

        // Initialize application on load
        window.onload = function() {
            document.getElementById('current-year').textContent = new Date().getFullYear();
            render();
        };

    </script>
</body>
</html>
